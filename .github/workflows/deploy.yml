name: Deploy

# Runs after CI passes on main, OR manually via the Actions tab (workflow_dispatch).
# Deploys both Workers in a single pipeline with migrations applied first,
# so schema changes always land before the code that depends on them.
# This solves issue #27 ("apply pending migrations on deploy") and replaces
# the old CF dashboard Git integration that only deployed the web Worker.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  API_WORKER_URL: https://kuruma-api.kanata-studio-dev.workers.dev
  WEB_WORKER_URL: https://kuruma-rental.kanata-studio-dev.workers.dev

jobs:
  deploy:
    # Skip if triggered by a failed CI run. workflow_dispatch always runs.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # 1. Migrate production DB BEFORE deploying new code.
      # If this fails, the whole deploy aborts — stale schema is safer
      # than new code on a pre-migration DB (see: the bug that started
      # this session).
      - name: Apply production migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          bun run db:migrate
          bun run db:verify

      # 2. Set API Worker secrets (idempotent — wrangler secret put is a
      # full replace, so running every deploy keeps the Worker in sync
      # with whatever is in GitHub Secrets).
      - name: Set API Worker secrets
        working-directory: packages/api
        run: |
          echo "${{ secrets.PROD_DATABASE_URL }}" | npx wrangler secret put DATABASE_URL

      # 3. Deploy API Worker. First-time run creates the Worker.
      - name: Deploy API Worker
        working-directory: packages/api
        run: npx wrangler deploy

      # 4. Smoke test the API before we point web traffic at it.
      # /health must return 200 and /bookings must not 500 (catches
      # the exact schema-drift class of bug that issue #27 tracks).
      - name: Smoke test API
        run: |
          curl -fsS "$API_WORKER_URL/health"
          curl -fsS "$API_WORKER_URL/bookings?from=2026-01-01T00:00:00Z&to=2026-12-31T00:00:00Z" > /dev/null
          echo "API smoke tests passed"

      # 5. Set Web Worker secrets (same idempotent pattern).
      - name: Set Web Worker secrets
        working-directory: packages/web
        run: |
          echo "${{ secrets.PROD_DATABASE_URL }}" | npx wrangler secret put DATABASE_URL
          echo "${{ secrets.AUTH_SECRET }}" | npx wrangler secret put AUTH_SECRET
          echo "${{ secrets.AUTH_GOOGLE_ID }}" | npx wrangler secret put AUTH_GOOGLE_ID
          echo "${{ secrets.AUTH_GOOGLE_SECRET }}" | npx wrangler secret put AUTH_GOOGLE_SECRET

      # 6. Build web. NEXT_PUBLIC_API_URL must be set at build time --
      # Next.js bakes NEXT_PUBLIC_* into the JS bundle, it is NOT
      # resolved at runtime. This is why the current production is
      # broken: web was built without this set and fell back to
      # http://localhost:8787.
      - name: Build Web Worker
        working-directory: packages/web
        env:
          NEXT_PUBLIC_API_URL: ${{ env.API_WORKER_URL }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          bun run build
          bun run build:worker

      - name: Deploy Web Worker
        working-directory: packages/web
        run: npx wrangler deploy

      # 7. Smoke test the web landing page (public, no auth required).
      - name: Smoke test Web
        run: |
          curl -fsS "$WEB_WORKER_URL/en" > /dev/null
          echo "Web landing OK"
